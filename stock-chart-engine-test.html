<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>360MiQ Stock Chart Engine Test</title>
  <link rel="stylesheet" href="assets/js/stock-chart-engine/stock-chart-engine.css">
  <style>
    :root {
      --page-bg: #f3f5f8;
      --chrome-bg: #ffffff;
      --panel-bg: #ffffff;
      --panel-elevated: #ffffff;
      --border: #d7dde7;
      --border-strong: #c5cedd;
      --text: #111827;
      --muted: #667085;
      --accent: #2563eb;
      --accent-text: #ffffff;
      --danger: #dc2626;
      --shadow: 0 18px 45px rgba(15, 23, 42, 0.16);
    }

    html[data-theme="dark"] {
      --page-bg: #0b111c;
      --chrome-bg: #0f1724;
      --panel-bg: #111a29;
      --panel-elevated: #151f31;
      --border: #253044;
      --border-strong: #354258;
      --text: #eef4ff;
      --muted: #9aa8bd;
      --accent: #60a5fa;
      --accent-text: #07111f;
      --danger: #f87171;
      --shadow: 0 20px 55px rgba(0, 0, 0, 0.45);
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      background: var(--page-bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    .test-shell {
      box-sizing: border-box;
      display: grid;
      gap: 0;
      grid-template-columns: 54px minmax(0, 1fr);
      grid-template-rows: 48px minmax(0, 1fr) auto;
      height: 100%;
      overflow: hidden;
    }

    .test-toolbar {
      align-items: center;
      background: var(--chrome-bg);
      border-bottom: 1px solid var(--border);
      color: var(--text);
      display: flex;
      gap: 8px;
      grid-column: 1 / 3;
      min-width: 0;
      overflow: visible;
      padding: 6px 10px;
      position: relative;
      z-index: 5;
    }

    .brand-lockup {
      align-items: center;
      display: flex;
      gap: 9px;
      min-width: 170px;
    }

    .brand-mark {
      align-items: center;
      background: var(--accent);
      color: var(--accent-text);
      display: flex;
      font-size: 12px;
      font-weight: 800;
      height: 26px;
      justify-content: center;
      width: 26px;
    }

    .brand-title {
      display: grid;
      gap: 1px;
    }

    .brand-title strong {
      font-size: 13px;
      line-height: 1;
    }

    .brand-title span {
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.03em;
      line-height: 1;
      text-transform: uppercase;
    }

    .toolbar-group {
      align-items: center;
      display: flex;
      gap: 6px;
      min-width: 0;
    }

    .toolbar-spacer {
      flex: 1 1 auto;
    }

    .test-group {
      display: grid;
      gap: 9px;
    }

    .control-menu {
      position: relative;
    }

    .control-menu summary {
      align-items: center;
      background: var(--panel-bg);
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      display: flex;
      font-size: 12px;
      font-weight: 700;
      gap: 6px;
      height: 32px;
      list-style: none;
      padding: 0 10px;
      white-space: nowrap;
    }

    .control-menu summary::-webkit-details-marker {
      display: none;
    }

    .control-menu[open] summary,
    .control-menu summary:hover {
      border-color: var(--accent);
    }

    .menu-panel {
      background: var(--panel-elevated);
      border: 1px solid var(--border-strong);
      box-shadow: var(--shadow);
      box-sizing: border-box;
      color: var(--text);
      display: grid;
      gap: 12px;
      min-width: 280px;
      padding: 12px;
      position: absolute;
      right: 0;
      top: 39px;
      z-index: 20;
    }

    .menu-panel.wide {
      min-width: 430px;
    }

    .test-label {
      color: var(--muted);
      display: block;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    button,
    select,
    input {
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      box-sizing: border-box;
      color: var(--text);
      font: 600 12px/1 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      height: 32px;
      max-width: 100%;
      padding: 0 9px;
    }

    button {
      cursor: pointer;
      white-space: nowrap;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--accent-text);
    }

    button:hover,
    button:focus,
    select:focus,
    input:focus {
      border-color: var(--accent);
      outline: none;
    }

    .button-grid {
      display: grid;
      gap: 6px;
      grid-template-columns: 1fr 1fr;
    }

    .icon-button {
      align-items: center;
      display: inline-flex;
      gap: 6px;
      justify-content: center;
    }

    .field-row {
      display: grid;
      gap: 6px;
      grid-template-columns: 1fr 84px;
    }

    .workbench {
      display: grid;
      grid-column: 1 / 3;
      grid-row: 2;
      grid-template-columns: 54px minmax(0, 1fr);
      min-height: 0;
      overflow: visible;
    }

    .drawing-rail {
      align-items: center;
      background: var(--chrome-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 0;
      padding: 8px 6px;
      position: relative;
      z-index: 6;
    }

    .drawing-tool-palette {
      align-content: start;
      display: flex;
      flex: 1 1 auto;
      flex-direction: column;
      gap: 4px;
      min-height: 0;
      overflow: visible;
      padding: 0 2px;
      width: 100%;
    }

    .drawing-tool-group {
      position: relative;
    }

    .drawing-group-button,
    .drawing-tool-button,
    .drawing-tool-flyout-button {
      align-items: center;
      background: transparent;
      border-color: transparent;
      color: var(--muted);
      display: flex;
      justify-content: center;
      padding: 0;
    }

    .drawing-group-button,
    .drawing-tool-button {
      height: 34px;
      width: 34px;
    }

    .drawing-group-button svg,
    .drawing-tool-button svg,
    .drawing-tool-flyout-button svg {
      height: 20px;
      pointer-events: none;
      width: 20px;
    }

    .drawing-group-button::after {
      border-bottom: 3px solid transparent;
      border-left: 3px solid currentColor;
      border-top: 3px solid transparent;
      content: "";
      opacity: 0.65;
      position: absolute;
      right: 1px;
      top: 14px;
    }

    .drawing-group-button:hover,
    .drawing-group-button:focus,
    .drawing-tool-flyout-button:hover,
    .drawing-tool-flyout-button:focus {
      background: rgba(96, 165, 250, 0.12);
      color: var(--accent);
      outline: none;
    }

    .drawing-group-button.is-open,
    .drawing-group-button.is-selected,
    .drawing-tool-flyout-button.is-selected,
    .drawing-tool-button.is-selected {
      background: rgba(96, 165, 250, 0.16);
      border-color: var(--accent);
      color: var(--accent);
    }

    .drawing-group-flyout {
      background: var(--panel-elevated);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      display: none;
      left: 42px;
      max-height: calc(100vh - 140px);
      min-width: 248px;
      overflow: auto;
      padding: 8px;
      position: absolute;
      top: -4px;
      z-index: 12;
    }

    .drawing-group-flyout.is-open {
      display: block;
    }

    .drawing-group-title {
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.08em;
      margin: 0 0 8px;
      text-transform: uppercase;
    }

    .drawing-group-grid {
      display: grid;
      gap: 4px;
      grid-template-columns: 1fr 1fr;
    }

    .drawing-tool-flyout-button {
      gap: 8px;
      height: 30px;
      justify-content: flex-start;
      min-width: 0;
      padding: 0 8px;
      width: 100%;
    }

    .drawing-tool-flyout-button span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .drawing-rail select {
      display: none;
    }

    .drawing-rail > button {
      align-items: center;
      background: transparent;
      border-color: transparent;
      color: var(--muted);
      display: flex;
      font-size: 11px;
      font-weight: 800;
      height: 34px;
      justify-content: center;
      padding: 0;
      width: 34px;
    }

    .drawing-rail > button:hover,
    .drawing-rail > button:focus {
      background: rgba(96, 165, 250, 0.12);
      color: var(--accent);
    }

    .rail-divider {
      background: var(--border);
      height: 1px;
      width: 28px;
    }

    .chart-stage {
      display: grid;
      grid-template-rows: minmax(0, 1fr);
      min-height: 0;
      padding: 8px 8px 0 8px;
    }

    .test-chart {
      min-height: 0;
    }

    .test-chart .sce-toolbar {
      display: none;
    }

    .drawing-tool-status {
      align-items: center;
      background: var(--chrome-bg);
      border-top: 1px solid var(--border);
      color: var(--muted);
      display: flex;
      font-size: 12px;
      grid-column: 1 / 3;
      min-height: 36px;
      padding: 0 12px;
    }

    .status-main {
      color: var(--text);
      font-weight: 700;
      margin-right: 10px;
    }

    .state-drawer {
      background: var(--chrome-bg);
      border-top: 1px solid var(--border);
      grid-column: 1 / 3;
      max-height: 36vh;
      overflow: auto;
    }

    .state-drawer summary {
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
      height: 32px;
      letter-spacing: 0.06em;
      line-height: 32px;
      padding: 0 12px;
      text-transform: uppercase;
    }

    .state-box {
      background: rgba(100, 116, 139, 0.1);
      border: 0;
      border-top: 1px solid var(--border);
      color: var(--text);
      font-family: Consolas, Monaco, monospace;
      font-size: 11px;
      margin: 0;
      max-height: 260px;
      min-height: 120px;
      overflow: auto;
      padding: 10px 12px;
      white-space: pre-wrap;
    }

    .mobile-panel {
      display: none;
    }

    @media (max-width: 880px) {
      .test-shell {
        grid-template-columns: 44px minmax(0, 1fr);
        grid-template-rows: auto minmax(0, 1fr) auto auto;
      }

      .test-toolbar {
        flex-wrap: wrap;
        grid-column: 1 / 3;
        min-height: 86px;
      }

      .brand-lockup {
        min-width: 140px;
      }

      .workbench {
        grid-column: 1 / 3;
        grid-template-columns: 44px minmax(0, 1fr);
      }

      .drawing-rail {
        padding: 6px 4px;
      }

      .drawing-tool-button {
        height: 32px;
        width: 32px;
      }

      .menu-panel,
      .menu-panel.wide {
        left: auto;
        max-width: calc(100vw - 18px);
        min-width: 280px;
        right: 0;
      }
    }
  </style>
</head>
<body>
  <main class="test-shell">
    <div class="test-toolbar">
      <div class="brand-lockup">
        <span class="brand-mark">3M</span>
        <span class="brand-title">
          <strong>Stock Chart Lab</strong>
          <span>DEMO.TEST workspace</span>
        </span>
      </div>

      <div class="toolbar-group">
        <select id="chartType" aria-label="Chart type">
          <option value="candlestick">Candlestick</option>
          <option value="bar">Bar</option>
          <option value="line">Line</option>
        </select>
        <select id="chartPeriod" aria-label="Chart period">
          <option value="daily">Daily</option>
          <option value="weekly">Weekly</option>
          <option value="monthly">Monthly</option>
          <option value="quarterly">Quarterly</option>
          <option value="yearly">Yearly</option>
        </select>
      </div>

      <details class="control-menu">
        <summary>Indicators</summary>
        <div class="menu-panel wide">
          <div class="test-group">
            <span class="test-label">Add Indicator</span>
            <div class="field-row">
              <select id="indicatorType">
                <option value="SMA">SMA</option>
                <option value="EMA">EMA</option>
                <option value="RSI">RSI</option>
                <option value="MACD">MACD</option>
                <option value="BBANDS">Bollinger</option>
                <option value="VOLUME">Volume</option>
                <option value="ATR">ATR</option>
                <option value="STOCH">Stochastic</option>
                <option value="VWAP">VWAP</option>
                <option value="WMA">WMA</option>
                <option value="HMA">HMA</option>
                <option value="DEMA">DEMA</option>
                <option value="TEMA">TEMA</option>
                <option value="ROC">ROC</option>
                <option value="MOM">Momentum</option>
                <option value="CCI">CCI</option>
                <option value="MFI">MFI</option>
                <option value="ADX">ADX</option>
                <option value="OBV">OBV</option>
                <option value="ADL">ADL</option>
                <option value="CMF">CMF</option>
                <option value="WILLIAMS">Williams %R</option>
                <option value="DONCHIAN">Donchian</option>
                <option value="KELTNER">Keltner</option>
                <option value="ICHIMOKU">Ichimoku</option>
                <option value="SUPERTREND">SuperTrend</option>
                <option value="PIVOTS">Pivot Points</option>
                <option value="PSAR">Parabolic SAR</option>
                <option value="TRIX">TRIX</option>
              </select>
              <button type="button" id="addIndicator">Add</button>
            </div>
          </div>

          <div class="test-group">
            <span class="test-label">Stacks</span>
            <div class="button-grid">
              <button type="button" id="addRsiStack">RSI + SMA</button>
              <button type="button" id="addMacdStack">MACD + EMA</button>
              <button type="button" id="addMa20">MA20</button>
              <button type="button" id="addMa200">MA200</button>
            </div>
          </div>
        </div>
      </details>

      <details class="control-menu">
        <summary>Style</summary>
        <div class="menu-panel">
          <div class="test-group">
            <span class="test-label">Pane Scale</span>
            <div class="field-row">
              <select id="paneScalePane"></select>
              <button type="button" id="togglePaneScale">Log</button>
            </div>
          </div>

          <div class="test-group">
            <span class="test-label">Indicator Settings</span>
            <select id="indicatorSettingsTarget"></select>
            <div class="field-row">
              <input id="indicatorPeriod" type="number" min="1" max="500" value="20" aria-label="Indicator period">
              <select id="indicatorOutput" aria-label="Indicator output"></select>
            </div>
            <div class="field-row">
              <input id="indicatorColor" type="color" value="#2563eb" aria-label="Series color">
              <input id="indicatorWidth" type="number" min="1" max="8" value="2" aria-label="Line thickness">
            </div>
            <div class="field-row">
              <select id="indicatorLineStyle" aria-label="Line style">
                <option value="solid">Solid</option>
                <option value="dash">Dash</option>
                <option value="dot">Dot</option>
              </select>
              <button type="button" id="applyIndicatorSettings">Apply</button>
            </div>
          </div>
        </div>
      </details>

      <details class="control-menu">
        <summary>Data</summary>
        <div class="menu-panel">
          <div class="button-grid">
            <button type="button" id="newData">New Demo Data</button>
            <button type="button" id="appendBar">Append Bar</button>
            <button type="button" id="saveLayout">Save</button>
            <button type="button" id="loadLayout">Load</button>
            <button type="button" id="resetLayout">Reset Saved</button>
          </div>
        </div>
      </details>

      <div class="toolbar-spacer"></div>

      <div class="toolbar-group">
        <button type="button" id="lightTheme">Light</button>
        <button type="button" id="darkTheme">Dark</button>
        <button type="button" class="primary" id="toggleTheme">Toggle Theme</button>
      </div>
    </div>

    <section class="workbench">
      <aside class="drawing-rail" aria-label="Drawing tools">
        <select id="drawingTool" aria-label="Drawing tool"></select>
        <button type="button" id="addDrawingTool" title="Place sample drawing" aria-label="Place sample drawing">+</button>
        <div class="rail-divider"></div>
        <div id="drawingToolPalette" class="drawing-tool-palette" role="toolbar" aria-label="Drawing tools"></div>
        <div class="rail-divider"></div>
        <button type="button" id="addTrendline" title="Sample trendline" aria-label="Sample trendline">TL</button>
        <button type="button" id="addRectangle" title="Sample rectangle" aria-label="Sample rectangle">[]</button>
        <button type="button" id="addPriceNote" title="Price note" aria-label="Price note">T</button>
        <button type="button" id="addPaneNote" title="Pane note" aria-label="Pane note">N</button>
        <button type="button" id="removeShapes" title="Clear drawings" aria-label="Clear drawings">X</button>
      </aside>

      <section class="chart-stage">
        <section id="chart" class="test-chart"></section>
      </section>
    </section>

    <div id="drawingToolStatus" class="drawing-tool-status">
      <span class="status-main">Ready</span>
      Select an icon, then click on the chart to place its points.
    </div>

    <details class="state-drawer">
      <summary>Serialized chart document</summary>
      <pre id="state" class="state-box"></pre>
    </details>
  </main>

  <script src="assets/js/stock-chart-engine/stock-chart-engine.js"></script>
  <script>
    (function () {
      var layoutId = 'stock-chart-engine-manual-test';
      var data = StockChartEngine.createDemoData(260);
      var chart = null;
      var trackedRsiId = null;
      var trackedMacdId = null;

      function setTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.dispatchEvent(new CustomEvent('themechange', {
          detail: { theme: theme, isDark: theme === 'dark' }
        }));
      }

      function seedChart(theme, loadSaved) {
        if (chart) chart.destroy();
        setTheme(theme || document.documentElement.getAttribute('data-theme') || 'light');
        chart = new StockChartEngine.Chart('#chart', {
          symbol: 'DEMO.TEST',
          interval: '1D',
          data: data,
          layoutId: layoutId,
          load: loadSaved !== false
        });
        if (!chart.document.indicators.length) {
          chart.addIndicator('VOLUME', { placement: 'new' });
          trackedRsiId = chart.addIndicator('RSI', { placement: 'new' });
        } else {
          trackedRsiId = findFirstIndicator('RSI');
          trackedMacdId = findFirstIndicator('MACD');
        }
        chart.on('change', function (event) {
          renderState();
          if (event.type === 'drawing:add') setDrawingToolStatus('Drawing created. Select another icon to draw again.');
          if (event.type === 'drawing:cancel') setDrawingToolStatus('Drawing canceled.');
          if (event.type === 'drawing:removeAll') setDrawingToolStatus('All drawings cleared.');
        });
        chart.on('save', renderState);
        document.getElementById('chartType').value = chart.document.settings.chartType;
        document.getElementById('chartPeriod').value = chart.document.settings.period || 'daily';
        renderState();
      }

      function findFirstIndicator(type) {
        var found = chart.document.indicators.filter(function (indicator) {
          return indicator.type === type;
        })[0];
        return found ? found.id : null;
      }

      function samplePoint(offset) {
        var index = Math.max(0, data.length - offset);
        return { time: data[index].time, value: data[index].close };
      }

      function sampleDrawingPoints(toolId) {
        var tool = StockChartEngine.drawingTools[toolId] || StockChartEngine.drawingTools.text;
        var count = Math.max(1, tool.points || 1);
        var points = [];
        for (var i = 0; i < count; i += 1) {
          points.push(samplePoint(110 - i * 14));
        }
        return points;
      }

      function indicatorPaneId(type) {
        var found = chart.document.indicators.filter(function (indicator) {
          return indicator.type === type;
        })[0];
        return found ? found.paneId : 'price';
      }

      function renderState() {
        var doc = chart.serialize();
        renderPaneScaleOptions(doc);
        renderIndicatorSettingsOptions(doc);
        var summary = {
          theme: doc.theme,
          symbol: doc.symbol,
          interval: doc.interval,
          chartType: doc.settings.chartType,
          period: doc.settings.period,
          renderedBars: chart.bars.length,
          sourceBars: chart.sourceBars.length,
          panes: doc.panes.map(function (pane) {
            return { id: pane.id, title: pane.title, height: pane.height, scaleMode: pane.scaleMode };
          }),
          indicators: doc.indicators.map(function (indicator) {
            return {
              id: indicator.id,
              type: indicator.type,
              paneId: indicator.paneId,
              source: indicator.source,
              inputs: indicator.inputs,
              styles: indicator.styles
            };
          }),
          drawings: doc.drawings.map(function (drawing) {
            return { id: drawing.id, type: drawing.type, paneId: drawing.paneId };
          })
        };
        document.getElementById('state').textContent = JSON.stringify(summary, null, 2);
      }

      function renderPaneScaleOptions(doc) {
        var select = document.getElementById('paneScalePane');
        var previous = select.value;
        select.innerHTML = '';
        doc.panes.forEach(function (pane) {
          var option = document.createElement('option');
          option.value = pane.id;
          option.textContent = (pane.title || pane.id) + ' - ' + (pane.scaleMode || 'linear').toUpperCase();
          select.appendChild(option);
        });
        if (previous && doc.panes.some(function (pane) { return pane.id === previous; })) {
          select.value = previous;
        }
      }

      function renderDrawingToolOptions() {
        var select = document.getElementById('drawingTool');
        var palette = document.getElementById('drawingToolPalette');
        var grouped = {};
        var categoryOrder = ['trend', 'fibonacci', 'geometric', 'annotation', 'pattern', 'measurement', 'marks'];
        var categoryMeta = {
          trend: { label: 'Trend Lines', primary: 'trendline' },
          fibonacci: { label: 'Fib & Gann', primary: 'fib_retracement' },
          geometric: { label: 'Shapes', primary: 'rectangle' },
          annotation: { label: 'Text & Notes', primary: 'text' },
          pattern: { label: 'Patterns', primary: 'xabcd_pattern' },
          measurement: { label: 'Measure & Forecast', primary: 'date_and_price_range' },
          marks: { label: 'Icons & Marks', primary: 'arrow_marker' }
        };

        function groupedCategory(tool) {
          if (tool.category === 'icon' || tool.category === 'sticker' || tool.category === 'emoji') return 'marks';
          return tool.category;
        }

        select.innerHTML = '';
        palette.innerHTML = '';
        Object.keys(StockChartEngine.drawingTools).forEach(function (id) {
          var tool = StockChartEngine.drawingTools[id];
          var category = groupedCategory(tool);
          if (!grouped[category]) grouped[category] = [];
          grouped[category].push(tool);
        });
        categoryOrder.concat(Object.keys(grouped).filter(function (category) {
          return categoryOrder.indexOf(category) === -1;
        })).forEach(function (category) {
          if (!grouped[category]) return;
          var meta = categoryMeta[category] || { label: category, primary: grouped[category][0].id };
          var group = document.createElement('optgroup');
          var railGroup = document.createElement('div');
          var groupButton = document.createElement('button');
          var flyout = document.createElement('div');
          var flyoutTitle = document.createElement('div');
          var flyoutGrid = document.createElement('div');
          var primaryTool = StockChartEngine.drawingTools[meta.primary] || grouped[category][0];

          group.label = meta.label;
          railGroup.className = 'drawing-tool-group';
          groupButton.type = 'button';
          groupButton.className = 'drawing-group-button';
          groupButton.dataset.category = category;
          groupButton.dataset.primaryToolId = primaryTool.id;
          groupButton.title = meta.label;
          groupButton.setAttribute('aria-label', meta.label);
          groupButton.setAttribute('aria-expanded', 'false');
          groupButton.innerHTML = primaryTool.icon || StockChartEngine.drawingToolIconSvg(primaryTool.id);
          flyout.className = 'drawing-group-flyout';
          flyout.dataset.category = category;
          flyout.setAttribute('role', 'menu');
          flyout.setAttribute('aria-label', meta.label);
          flyoutTitle.className = 'drawing-group-title';
          flyoutTitle.textContent = meta.label;
          flyoutGrid.className = 'drawing-group-grid';

          groupButton.addEventListener('click', function () {
            toggleDrawingToolGroup(category);
          });

          grouped[category].forEach(function (tool) {
            var option = document.createElement('option');
            var button = document.createElement('button');
            option.value = tool.id;
            option.textContent = tool.name;
            group.appendChild(option);

            button.type = 'button';
            button.className = 'drawing-tool-flyout-button';
            button.dataset.toolId = tool.id;
            button.dataset.category = category;
            button.title = tool.name;
            button.setAttribute('aria-label', tool.name);
            button.setAttribute('role', 'menuitem');
            button.innerHTML = tool.icon || StockChartEngine.drawingToolIconSvg(tool.id);
            button.insertAdjacentHTML('beforeend', '<span>' + escapeHtml(tool.name) + '</span>');
            button.addEventListener('click', function () {
              select.value = tool.id;
              closeDrawingToolGroups();
              syncDrawingToolButtons();
              startSelectedDrawingTool();
            });
            flyoutGrid.appendChild(button);
          });
          select.appendChild(group);
          flyout.appendChild(flyoutTitle);
          flyout.appendChild(flyoutGrid);
          railGroup.appendChild(groupButton);
          railGroup.appendChild(flyout);
          palette.appendChild(railGroup);
        });
        select.addEventListener('change', function () {
          syncDrawingToolButtons();
          startSelectedDrawingTool();
        });
        document.addEventListener('click', function (event) {
          if (!event.target.closest || !event.target.closest('.drawing-tool-palette')) closeDrawingToolGroups();
        });
        document.addEventListener('keydown', function (event) {
          if (event.key === 'Escape') closeDrawingToolGroups();
        });
        syncDrawingToolButtons();
        setDrawingToolStatus('');
      }

      function escapeHtml(value) {
        return String(value == null ? '' : value).replace(/[&<>"']/g, function (char) {
          return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[char];
        });
      }

      function closeDrawingToolGroups() {
        Array.prototype.forEach.call(document.querySelectorAll('.drawing-group-button'), function (button) {
          button.classList.remove('is-open');
          button.setAttribute('aria-expanded', 'false');
        });
        Array.prototype.forEach.call(document.querySelectorAll('.drawing-group-flyout'), function (flyout) {
          flyout.classList.remove('is-open');
        });
      }

      function toggleDrawingToolGroup(category) {
        var groupButton = document.querySelector('.drawing-group-button[data-category="' + category + '"]');
        var flyout = document.querySelector('.drawing-group-flyout[data-category="' + category + '"]');
        var shouldOpen = !(flyout && flyout.classList.contains('is-open'));
        closeDrawingToolGroups();
        if (!shouldOpen || !groupButton || !flyout) return;
        groupButton.classList.add('is-open');
        groupButton.setAttribute('aria-expanded', 'true');
        flyout.classList.add('is-open');
      }

      function syncDrawingToolButtons() {
        var selected = document.getElementById('drawingTool').value;
        var selectedCategory = null;
        Array.prototype.forEach.call(document.querySelectorAll('.drawing-tool-flyout-button'), function (button) {
          var isSelected = button.dataset.toolId === selected;
          button.classList.toggle('is-selected', isSelected);
          button.setAttribute('aria-pressed', isSelected ? 'true' : 'false');
          if (isSelected) selectedCategory = button.dataset.category;
        });
        Array.prototype.forEach.call(document.querySelectorAll('.drawing-group-button'), function (button) {
          var isSelected = button.dataset.category === selectedCategory;
          button.classList.toggle('is-selected', isSelected);
          button.setAttribute('aria-pressed', isSelected ? 'true' : 'false');
        });
      }

      function setDrawingToolStatus(message) {
        document.getElementById('drawingToolStatus').textContent = message || 'Select an icon, then click on the chart to place its points.';
      }

      function startSelectedDrawingTool() {
        var toolId = document.getElementById('drawingTool').value || 'trendline';
        var tool = StockChartEngine.drawingTools[toolId] || StockChartEngine.drawingTools.trendline;
        chart.startDrawing(toolId, {
          text: tool.name,
          style: { color: '#2563eb', width: tool.category === 'geometric' ? 2 : 1.8 }
        });
        setDrawingToolStatus(tool.name + ': click ' + Math.max(1, tool.points || 1) + ' point' + ((tool.points || 1) === 1 ? '' : 's') + ' on the chart. Esc cancels.');
      }

      function renderIndicatorSettingsOptions(doc) {
        var target = document.getElementById('indicatorSettingsTarget');
        var previousTarget = target.value;
        target.innerHTML = '';
        doc.indicators.forEach(function (indicator) {
          var option = document.createElement('option');
          option.value = indicator.id;
          option.textContent = indicator.type + ' - ' + indicator.id;
          target.appendChild(option);
        });
        if (previousTarget && doc.indicators.some(function (indicator) { return indicator.id === previousTarget; })) {
          target.value = previousTarget;
        }
        syncIndicatorSettingsFields();
      }

      function selectedIndicator() {
        var id = document.getElementById('indicatorSettingsTarget').value;
        return chart.document.indicators.filter(function (indicator) {
          return indicator.id === id;
        })[0] || null;
      }

      function syncIndicatorSettingsFields() {
        var indicator = selectedIndicator();
        var outputSelect = document.getElementById('indicatorOutput');
        outputSelect.innerHTML = '';
        if (!indicator) return;

        Object.keys(indicator.styles || { value: {} }).forEach(function (outputName) {
          var option = document.createElement('option');
          option.value = outputName;
          option.textContent = outputName;
          outputSelect.appendChild(option);
        });

        var length = indicator.inputs && indicator.inputs.length;
        document.getElementById('indicatorPeriod').value = length || 20;
        syncIndicatorOutputFields();
      }

      function syncIndicatorOutputFields() {
        var indicator = selectedIndicator();
        if (!indicator) return;
        var outputName = document.getElementById('indicatorOutput').value || Object.keys(indicator.styles || { value: {} })[0];
        var style = indicator.styles && indicator.styles[outputName] || {};
        document.getElementById('indicatorColor').value = style.color || '#2563eb';
        document.getElementById('indicatorWidth').value = style.lineWidth || 2;
        document.getElementById('indicatorLineStyle').value = style.lineStyle || 'solid';
      }

      document.getElementById('toggleTheme').addEventListener('click', function () {
        setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
      });

      document.getElementById('lightTheme').addEventListener('click', function () {
        seedChart('light', false);
      });

      document.getElementById('darkTheme').addEventListener('click', function () {
        seedChart('dark', false);
      });

      document.getElementById('saveLayout').addEventListener('click', function () {
        chart.save();
        renderState();
      });

      document.getElementById('loadLayout').addEventListener('click', function () {
        chart.load(layoutId);
        trackedRsiId = findFirstIndicator('RSI');
        trackedMacdId = findFirstIndicator('MACD');
        document.getElementById('chartType').value = chart.document.settings.chartType;
        document.getElementById('chartPeriod').value = chart.document.settings.period || 'daily';
        renderState();
      });

      document.getElementById('resetLayout').addEventListener('click', function () {
        chart.storage.remove(layoutId);
        trackedRsiId = null;
        trackedMacdId = null;
        seedChart(document.documentElement.getAttribute('data-theme'), false);
      });

      document.getElementById('newData').addEventListener('click', function () {
        data = StockChartEngine.createDemoData(260);
        chart.setData(data);
        renderState();
      });

      document.getElementById('chartType').addEventListener('change', function () {
        chart.setChartType(this.value);
        renderState();
      });

      document.getElementById('chartPeriod').addEventListener('change', function () {
        chart.setPeriod(this.value);
        renderState();
      });

      document.getElementById('togglePaneScale').addEventListener('click', function () {
        chart.togglePaneScaleMode(document.getElementById('paneScalePane').value || 'price');
        renderState();
      });

      document.getElementById('addIndicator').addEventListener('click', function () {
        var type = document.getElementById('indicatorType').value;
        var definition = StockChartEngine.Indicators[type];
        var placement = definition && definition.defaultPanePolicy === 'source' ? 'source' : 'new';
        var id = chart.addIndicator(type, { placement: placement });
        if (type === 'RSI') trackedRsiId = id;
        if (type === 'MACD') trackedMacdId = id;
        renderState();
      });

      document.getElementById('addRsiStack').addEventListener('click', function () {
        if (!trackedRsiId) trackedRsiId = chart.addIndicator('RSI', { placement: 'new' });
        chart.addIndicator('SMA', {
          source: { kind: 'indicator', indicatorId: trackedRsiId, output: 'value' },
          inputs: { length: 9 }
        });
        renderState();
      });

      document.getElementById('addMa20').addEventListener('click', function () {
        chart.addIndicator('SMA', { placement: 'source', inputs: { length: 20 } });
        renderState();
      });

      document.getElementById('addMa200').addEventListener('click', function () {
        chart.addIndicator('SMA', { placement: 'source', inputs: { length: 200 } });
        renderState();
      });

      document.getElementById('indicatorSettingsTarget').addEventListener('change', syncIndicatorSettingsFields);
      document.getElementById('indicatorOutput').addEventListener('change', syncIndicatorOutputFields);
      document.getElementById('applyIndicatorSettings').addEventListener('click', function () {
        var indicator = selectedIndicator();
        if (!indicator) return;
        var outputName = document.getElementById('indicatorOutput').value || 'value';
        var period = Number(document.getElementById('indicatorPeriod').value);
        var style = {};
        style[outputName] = {
          color: document.getElementById('indicatorColor').value,
          lineWidth: Number(document.getElementById('indicatorWidth').value),
          lineStyle: document.getElementById('indicatorLineStyle').value
        };
        chart.updateIndicatorSettings(indicator.id, {
          inputs: Number.isFinite(period) && period > 0 ? { length: period } : {},
          styles: style
        });
        renderState();
      });

      document.getElementById('addMacdStack').addEventListener('click', function () {
        if (!trackedMacdId) trackedMacdId = chart.addIndicator('MACD', { placement: 'new' });
        chart.addIndicator('EMA', {
          source: { kind: 'indicator', indicatorId: trackedMacdId, output: 'macd' },
          inputs: { length: 5 }
        });
        renderState();
      });

      document.getElementById('addDrawingTool').addEventListener('click', function () {
        var toolId = document.getElementById('drawingTool').value || 'trendline';
        var tool = StockChartEngine.drawingTools[toolId] || StockChartEngine.drawingTools.trendline;
        chart.addDrawing(toolId, sampleDrawingPoints(toolId), {
          paneId: 'price',
          text: tool.name,
          style: { color: '#2563eb', width: tool.category === 'geometric' ? 2 : 1.8 }
        });
        renderState();
      });

      document.getElementById('addTrendline').addEventListener('click', function () {
        chart.addDrawing('trendline', [samplePoint(90), samplePoint(20)], {
          paneId: 'price',
          style: { color: '#2563eb', width: 2 }
        });
        renderState();
      });

      document.getElementById('addRectangle').addEventListener('click', function () {
        chart.addDrawing('rectangle', [samplePoint(70), samplePoint(35)], {
          paneId: 'price',
          style: { color: '#7c3aed', fill: 'rgba(124, 58, 237, 0.14)' }
        });
        renderState();
      });

      document.getElementById('addPriceNote').addEventListener('click', function () {
        chart.addDrawing('text', [samplePoint(8)], {
          paneId: 'price',
          text: 'Price annotation',
          style: { color: '#d97706' }
        });
        renderState();
      });

      document.getElementById('addPaneNote').addEventListener('click', function () {
        chart.addDrawing('text', [{ time: samplePoint(12).time, value: 55 }], {
          paneId: indicatorPaneId('RSI'),
          text: 'Pane annotation',
          style: { color: '#0891b2' }
        });
        renderState();
      });

      document.getElementById('removeShapes').addEventListener('click', function () {
        chart.removeAllShapes();
        renderState();
      });

      document.getElementById('appendBar').addEventListener('click', function () {
        var last = data[data.length - 1];
        var open = last.close;
        var close = Math.max(5, open + (Math.random() - 0.45) * 3);
        var bar = {
          time: last.time + 86400,
          open: open,
          high: Math.max(open, close) + Math.random() * 1.8,
          low: Math.min(open, close) - Math.random() * 1.8,
          close: close,
          volume: 800000 + Math.random() * 1800000
        };
        data.push(bar);
        chart.updateBar(bar);
        renderState();
      });

      renderDrawingToolOptions();
      seedChart('light', true);
    }());
  </script>
</body>
</html>
